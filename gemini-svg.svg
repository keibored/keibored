    <text x="850" y="82" font-size="17" font-style="italic" fill="#ffffff" opacity="0.9" text-anchor="end" letter-spacing="1.5">✦<animate attributeName="opacity" values="0.55;1;0.55" dur="6.4s" begin="1.2s" repeatCount="indefinite"/></text>

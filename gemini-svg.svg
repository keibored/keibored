    <pattern id="scallop" width="26" height="26" patternUnits="userSpaceOnUse" x="30" y="135"><circle cx="13" cy="13" r="13" fill="#fdfbff"></circle></pattern>
    <filter id="cardShadow" x="-20%" y="-10%" width="140%" height="130%"><feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#7c3fb5" flood-opacity="0.28"></feDropShadow></filter>
    <clipPath id="cardClip"><rect x="30" y="30" width="860" height="680" rx="34"></rect></clipPath>
  </defs>
  <rect x="30" y="30" width="860" height="680" rx="34" fill="url(#card)" filter="url(#cardShadow)"></rect>
  <g clip-path="url(#cardClip)">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 740" width="920" height="740" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <style><![CDATA[
      .pill { transition: transform .25s ease, filter .25s ease; transform-box: fill-box; transform-origin: center; }
      .pill:hover { transform: translateY(-2px); filter: drop-shadow(0 4px 8px rgba(124,63,181,0.3)); }
    ]]></style>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="barClip1"><rect x="570" y="464" width="272" height="8" rx="4"/></clipPath>
    <clipPath id="barClip2"><rect x="570" y="510" width="272" height="8" rx="4"/></clipPath>
    <clipPath id="barClip3"><rect x="570" y="556" width="272" height="8" rx="4"/></clipPath>
         
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fdfbff"></stop><stop offset="1" stop-color="#f7f0fd"></stop></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c9a4e8"></stop><stop offset="0.5" stop-color="#ab7ce0"></stop><stop offset="1" stop-color="#d0b0ee"></stop></linearGradient>
    <linearGradient id="bow" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbf5ff"></stop><stop offset="1" stop-color="#cfaef0"></stop></linearGradient>
